<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Outbreak Cutscene</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #0f0f1e;
      --bg-mid: #1a1a2e;
      --bg-light: #16213e;
      --panel-bg: rgba(15, 52, 96, 0.3);
      --panel-border: #00d4ff;
      --panel-outer: #0f0f1e;
      --text: #f0f4f8;
      --muted: #a0aec0;
      --accent: #00d4ff;
      --accent-dark: #7c3aed;
      --button-blue: #00d4ff;
      --button-blue-dark: #7c3aed;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.15), transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1), transparent 50%),
        linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
    }

    #app::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg,
          rgba(0, 212, 255, 0.02) 0 2px,
          transparent 2px 148px);
      pointer-events: none;
      opacity: 0.15;
      z-index: 0;
    }


    #app::after {
      content: "";
      position: absolute;
      top: -18%;
      left: 22%;
      width: 46vw;
      height: 46vw;
      border-radius: 50%;
      background: rgba(124, 58, 237, 0.15);
      filter: blur(2px);
      pointer-events: none;
      z-index: 0;
    }

    .scene-bg {
      position: absolute;
      top: 44px;
      right: 44px;
      width: min(56vw, 860px);
      height: calc(100vh - 128px);
      object-fit: cover;
      background: #02040a;
      border-radius: 24px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      filter: brightness(0.7) saturate(0.85) contrast(1.1);
      z-index: 1;
    }

    .scene-frame {
      position: absolute;
      top: 44px;
      right: 44px;
      width: min(56vw, 860px);
      height: calc(100vh - 128px);
      border-radius: 24px;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .scene-frame::before,
    .scene-frame::after {
      content: "";
      position: absolute;
      top: 18px;
      height: calc(100% - 36px);
      transform: skewX(-12deg);
      background: rgba(255, 255, 255, 0.06);
    }

    .scene-frame::before {
      right: 132px;
      width: 84px;
    }

    .scene-frame::after {
      right: 90px;
      width: 26px;
      opacity: 0.5;
    }

    .left-ui {
      position: absolute;
      left: 48px;
      top: 42px;
      width: min(34vw, 520px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 3;
    }



    .textbox {
      position: relative;
      min-height: 56vh;
      background: rgba(15, 52, 96, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(0, 212, 255, 0.2);
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .scene-card {
      border-radius: 14px;
      border: 1px solid rgba(124, 58, 237, 0.4);
      background: rgba(15, 52, 96, 0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 14px 16px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(0, 212, 255, 0.15);
      min-height: 118px;
    }

    .scene-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
    }

    .textbox p {
      margin: 0;
      font-size: clamp(20px, 2vw, 30px);
      line-height: 1.45;
      white-space: pre-line;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.02em;
      min-height: 60px;
    }

    .progress-wrap {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding: 0 4px;
    }

    .progress-dot {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.08);
    }

    .progress-dot.active {
      background: linear-gradient(180deg, var(--accent) 0%, #c59d24 100%);
      border-color: var(--accent-dark);
    }

    .next-btn {
      position: absolute;
      left: 48px;
      bottom: 44px;
      width: 220px;
      height: 64px;
      border-radius: 14px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));
      color: var(--accent);
      font: 700 1.1rem 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      display: none;
      z-index: 4;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.3s ease;
    }

    .next-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 12px 24px rgba(0, 0, 0, 0.4);
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.3), rgba(124, 58, 237, 0.3));
    }

    .next-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4), 0 4px 12px rgba(0, 0, 0, 0.3);
    }

    .dialogue-box {
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 40px;
      height: min(44vh, 360px);
      background: rgba(15, 52, 96, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(0, 212, 255, 0.2);
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      z-index: 5;
    }

    .history {
      flex: 1;
      overflow-y: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      line-height: 1.45;
      white-space: pre-wrap;
      color: var(--text);
      padding-right: 6px;
    }

    .history::-webkit-scrollbar {
      width: 10px;
    }

    .history::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 999px;
    }

    .prompt-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      color: var(--accent);
      border-radius: 12px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      background: rgba(15, 52, 96, 0.25);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 12px 14px;
      box-shadow: inset 0 1px 0 rgba(0, 212, 255, 0.15);
    }

    .prompt-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font: inherit;
    }

    .timer {
      position: absolute;
      top: 30px;
      right: 62px;
      font: bold 32px 'IBM Plex Mono', monospace;
      color: var(--accent);
      display: none;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
      z-index: 6;
      background: rgba(15, 52, 96, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      border-radius: 14px;
      padding: 10px 14px;
    }

    .status-tag {
      position: absolute;
      right: 72px;
      bottom: 64px;
      padding: 10px 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.8), rgba(124, 58, 237, 0.8));
      color: #0f0f1e;
      border: 2px solid var(--accent);
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      z-index: 4;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.6), 0 8px 24px rgba(0, 0, 0, 0.4);
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
    }

    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(6px);
      text-align: center;
      color: #fff;
    }

    .result-overlay.hidden {
      display: none;
    }

    .result-panel {
      background: rgba(5, 17, 35, 0.92);
      border: 2px solid var(--accent);
      border-radius: 16px;
      padding: 28px 36px;
      width: min(380px, 90vw);
      max-width: 520px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
      font-family: 'IBM Plex Mono', monospace;
    }

    .result-emoji {
      font-size: 4rem;
      margin-bottom: 14px;
      animation: pulse 800ms ease-in-out infinite alternate;
    }

    .result-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .result-title.win {
      color: #2ecc71;
    }

    .result-title.lose {
      color: #e74c3c;
    }

    .result-text {
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 18px;
      font-size: 1.1rem;
      font-family: 'IBM Plex Mono', monospace;
    }

    .retry-btn {
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      border: 0;
      color: #fff;
      font: 700 0.95rem 'IBM Plex Mono', monospace;
      padding: 12px 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      width: 100%;
      max-width: 240px;
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 980px) {

      .scene-bg,
      .scene-frame {
        position: absolute;
        left: 24px;
        right: 24px;
        top: 24px;
        width: auto;
        height: 38vh;
      }

      .left-ui {
        left: 24px;
        right: 24px;
        top: calc(38vh + 42px);
        width: auto;
      }

      .textbox {
        min-height: 42vh;
      }

      .next-btn {
        left: 24px;
        bottom: 24px;
      }

      .dialogue-box {
        left: 24px;
        right: 24px;
      }

      .timer {
        right: 36px;
      }

      .status-tag {
        right: 42px;
        bottom: auto;
        top: calc(38vh - 22px);
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <img id="sceneBg" class="scene-bg" src="" alt="Scene" />
    <div class="scene-frame"></div>
    <div class="status-tag">Quarantine Sector</div>

    <div class="left-ui">
      <div id="cutsceneBox" class="textbox">
        <div class="scene-card">
          <div class="scene-label">Case Log</div>
          <p id="sceneText"></p>
        </div>
        <div id="progressWrap" class="progress-wrap"></div>
      </div>
    </div>

    <button id="nextBtn" class="next-btn">Next</button>
    <button id="skipBtn" class="next-btn" style="left: 280px;">Skip to Interrogation</button>

    <div id="timer" class="timer">05:00</div>

    <div id="dialogueBox" class="dialogue-box">
      <div id="history" class="history"></div>
      <div id="promptRow" class="prompt-row">
        <span>&gt; Player:</span>
        <input id="playerInput" type="text" maxlength="100" autocomplete="off" />
      </div>
    </div>
  </div>

  <div id="resultOverlay" class="result-overlay hidden">
    <div class="result-panel">
      <div id="resultEmoji" class="result-emoji"></div>
      <div id="resultTitle" class="result-title"></div>
      <div id="resultText" class="result-text"></div>
      <button id="retryBtn" class="retry-btn" onclick="restartGame()">↺ TRY AGAIN</button>
    </div>
  </div>

  <script>
    const INTEGRATED_GAME_URL = './lab_breakout_integrated%20(7).html?from=cutscene';
    const PAUSE_BETWEEN_SCENES = 5000;
    const INTERROGATION_TIME = 300;

    const scenes = [
      {
        image: 'image1.jpg',
        text: '3:03 AM\nAt this hour, the lab is silent — just the low hum of machines and the soft glow of monitors.'
      },
      {
        image: 'image2.jpg',
        text: '3:04 AM ⚠️ BIOHAZARD DETECTED. INITIATING LOCKDOWN.\nSomething inside containment has been released.'
      },
      {
        image: 'image3.jpg',
        text: "Doors slam shut across the facility. In an attempt to contain the threat, the lab's security system has locked down all exits, trapping everyone in the rooms where they are."
      },
      {
        image: 'image4.jpg',
        text: 'Everyone except one.\nIn the chaos, the individual responsible for the breach has managed to slip out of their containment area and into the main lab, where they are now hiding among the other scientists.'
      },
      {
        image_S1: 'image_s1.jpg',
        text: "Suspect 1: Dr. Evelyn Kallen, a brilliant Microbiologist known for her groundbreaking research on infectious diseases. She's been under immense pressure to produce results and has been seen arguing with lab management over funding cuts."
      },
      {
        image_S2: 'image_s2.jpg',
        text: "Suspect 2: Dr. Marcus Reed, a Bioinformatician who has been working closely with the containment unit. He's known for his secretive nature and has been spotted near the containment area shortly before the breach."
      },
      {
        image_S3: 'image_s3.jpg',
        text: "Suspect 3: Dr. Lucas Rivera, a Senior Lab Technician responsible for maintaining the containment systems. He's been praised for his dedication but has recently been exhibiting signs of stress and erratic behavior."
      },
      {
        image_S4: 'image_s4.jpg',
        text: "Suspect 4: Dr. Samuel Ortiz, a Quality Control Analyst who has access to all areas of the lab. He's been under investigation for falsifying data in his reports and has a history of conflicts with his colleagues."
      },
      {
        image_S5: 'image_s5.jpg',
        text: "Suspect 5: Dr. Penelope Grant, a Sterile Area technician who was responsible for the last maintenance check of the containment unit. She's known for her meticulous work but has been facing personal issues that have affected her performance recently."
      },
      {
        image: 'image5.jpg',
        text: "As the city's top detective, it's your job to interrogate the suspects and determine who is responsible for the breach before it's too late. The clock is ticking, and the fate of the city hangs in the balance."
      }
    ];

    const dialogue = [
      ['Dr. Lucia Chen', "I was maintaining the containment systems all evening — you can check the logs."],
      ['Dr. Marcus Reed', "That's not the whole story. I was near the unit, yes, but only running diagnostics."],
      ['Dr. Evelyn Kallen', "I had nothing to do with this. My research is completely above board."],
      ['Dr. Samuel Ortiz', "I know how this looks, but I haven't falsified anything. Someone's setting me up."],
      ['Dr. Penelope Grant', "I signed off on that maintenance check myself. Everything was sealed properly."]
    ];

    // Suspect roster: maps S1-S5 to the interrogation cast.
    const SUSPECT_ROSTER = {
      S1: { name: 'Dr. Evelyn Kallen', job: 'Microbiologist' },
      S2: { name: 'Dr. Marcus Reed', job: 'Bioinformatician' },
      S3: { name: 'Dr. Lucia Chen', job: 'Senior Lab Technician' },
      S4: { name: 'Dr. Samuel Ortiz', job: 'Quality Control Analyst' },
      S5: { name: 'Dr. Penelope Grant', job: 'Sterile Area Technician' },
    };

    // Returns the display label for a suspect ID, e.g. "Dr. Evelyn Kallen (S1)"
    function suspectLabel(id) {
      const s = SUSPECT_ROSTER[id];
      return s ? `${s.name} (${id})` : id;
    }

    // Placeholder browser versions of the Python functions.
    function initializeSuspects() {
      return Object.keys(SUSPECT_ROSTER); // ['S1','S2','S3','S4','S5']
    }

    function checkVerdict(code) {
      const correct = 'S3'; // Dr. Lucia Chen is the culprit in the demo build
      if (code === correct) {
        return [true, `Correct. ${suspectLabel(code)} was responsible for the breach.`];
      }
      return [false, `Incorrect. ${suspectLabel(code)} is not the culprit. Keep investigating.`];
    }

    const sceneBg = document.getElementById('sceneBg');
    const sceneText = document.getElementById('sceneText');
    const cutsceneBox = document.getElementById('cutsceneBox');
    const nextBtn = document.getElementById('nextBtn');
    const skipBtn = document.getElementById('skipBtn');
    const dialogueBox = document.getElementById('dialogueBox');
    const historyEl = document.getElementById('history');
    const playerInput = document.getElementById('playerInput');
    const timerEl = document.getElementById('timer');
    const promptRow = document.getElementById('promptRow');
    const progressWrap = document.getElementById('progressWrap');
    const statusTag = document.querySelector('.status-tag');

    let sceneIndex = 0;
    let sceneTimeout = null;
    let dialogueIndex = 0;
    let gameOver = false;
    let interrogationRemaining = INTERROGATION_TIME;
    let timerInterval = null;

    function renderProgress(index) {
      progressWrap.innerHTML = '';
      scenes.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'progress-dot' + (i === index ? ' active' : '');
        progressWrap.appendChild(dot);
      });
    }

    function loadScene(index) {
      const scene = scenes[index];
      const imageKey = Object.keys(scene).find(key => key.startsWith('image'));
      sceneBg.src = imageKey ? scene[imageKey] : '';
      sceneText.textContent = scene.text;
      renderProgress(index);

      if (sceneTimeout) clearTimeout(sceneTimeout);

      // Always show the buttons for manual control
      nextBtn.style.display = 'block';
      skipBtn.style.display = 'block';
      if (index === scenes.length - 1) {
        nextBtn.textContent = 'Start Interrogation';
        skipBtn.style.display = 'none'; // No need to skip on last scene
      } else {
        nextBtn.textContent = 'Next';
      }
    }

    function appendHistory(speaker, text) {
      const line = document.createElement('div');
      line.textContent = `> ${speaker}: ${text}`;
      historyEl.appendChild(line);
      historyEl.scrollTop = historyEl.scrollHeight + line.offsetHeight;
    }

    function updateTimer() {
      const minutes = String(Math.floor(interrogationRemaining / 60)).padStart(2, '0');
      const seconds = String(interrogationRemaining % 60).padStart(2, '0');
      timerEl.textContent = `${minutes}:${seconds}`;

      if (interrogationRemaining > 30) {
        timerEl.style.color = 'rgb(212, 175, 55)';
      } else if (interrogationRemaining > 0) {
        timerEl.style.color = 'rgb(255, 100, 100)';
      } else {
        timerEl.style.color = 'rgb(255, 0, 0)';
      }
    }

    function endInterrogation(message, won = null) {
      gameOver = true;
      appendHistory('System', message);
      promptRow.classList.add('hidden');
      clearInterval(timerInterval);

      const overlay = document.getElementById('resultOverlay');
      const emoji = document.getElementById('resultEmoji');
      const title = document.getElementById('resultTitle');
      const text = document.getElementById('resultText');
      const retryBtn = document.getElementById('retryBtn');

      if (won === true) {
        emoji.textContent = '🎉';
        title.textContent = 'VICTORY';
        title.className = 'result-title win';
        text.textContent = message || 'You solved the case!';
        retryBtn.textContent = '↺ BACK TO MENU';
        retryBtn.onclick = goToMenu;
      } else if (won === false) {
        emoji.textContent = '💀';
        title.textContent = 'GAME OVER';
        title.className = 'result-title lose';
        text.textContent = message || 'You failed to identify the culprit in time.';
        retryBtn.textContent = '↺ BACK TO MENU';
        retryBtn.onclick = goToMenu;
      } else {
        emoji.textContent = 'ℹ️';
        title.textContent = 'INTERROGATION FINISHED';
        title.className = 'result-title';
        text.textContent = message || 'Interrogation complete.';
        retryBtn.textContent = '↺ PLAY AGAIN';
      }

      overlay.classList.remove('hidden');
    }

    function goToMenu() {
      window.location.href = 'lab_breakout_integrated%20(7).html';
    }

    function restartGame() {
      gameOver = false;
      interrogationRemaining = INTERROGATION_TIME;
      dialogueIndex = 0;
      historyEl.innerHTML = '';
      promptRow.classList.remove('hidden');
      document.getElementById('resultOverlay').classList.add('hidden');
      timerEl.style.display = 'none';
      sceneIndex = 0;
      sceneBg.src = '';
      sceneText.textContent = '';
      statusTag.classList.remove('hidden');
      cutsceneBox.classList.remove('hidden');
      nextBtn.classList.remove('hidden');
      skipBtn.classList.remove('hidden');
      loadScene(sceneIndex);
      clearInterval(timerInterval);
    }

    function startInterrogation() {
      sessionStorage.setItem('labBreakoutIntroSeen', 'true');
      window.location.href = INTEGRATED_GAME_URL;
    }

    nextBtn.addEventListener('click', () => {
      if (sceneIndex < scenes.length - 1) {
        sceneIndex += 1;
        loadScene(sceneIndex);
      } else {
        startInterrogation();
      }
    });

    skipBtn.addEventListener('click', startInterrogation);

    playerInput.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' || gameOver) return;

      const value = playerInput.value.trim();
      if (!value) return;

      appendHistory('Player', value);
      const userInput = value.toUpperCase();

      if (['S1', 'S2', 'S3', 'S4', 'S5'].includes(userInput)) {
        const [correct, message] = checkVerdict(userInput);
        endInterrogation(message, correct);
      } else {
        if (dialogueIndex < dialogue.length) {
          const [speaker, text] = dialogue[dialogueIndex];
          appendHistory(speaker, text);
          dialogueIndex += 1;
        }
      }

      playerInput.value = '';
    });

    loadScene(sceneIndex);
  </script>
</body>

</html>
